<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Moodwave">
  <meta name="theme-color" content="#07080f">
  <title>Moodwave — Ta playlist selon ton mood</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#07080f;--surface:rgba(255,255,255,.06);--border:rgba(255,255,255,.14);--text:#f0f0ff;--muted:rgba(240,240,255,.6);--accent:#7c6aff;--accent2:#c4b5fd;--cyan:#a5f3fc}
    html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden}

    /* FOND ANIMÉ */
    #bg-canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}
    .orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;animation:orbFloat 14s ease-in-out infinite;filter:blur(70px)}
    .orb1{width:600px;height:600px;background:radial-gradient(circle,rgba(79,70,229,.55),transparent);top:-180px;left:-180px;animation-duration:13s}
    .orb2{width:500px;height:500px;background:radial-gradient(circle,rgba(124,58,237,.5),transparent);top:35%;right:-120px;animation-duration:17s;animation-delay:-5s}
    .orb3{width:450px;height:450px;background:radial-gradient(circle,rgba(8,145,178,.45),transparent);bottom:-100px;left:30%;animation-duration:15s;animation-delay:-2s}
    .orb4{width:400px;height:400px;background:radial-gradient(circle,rgba(190,24,93,.3),transparent);top:20%;left:25%;filter:blur(80px);animation-duration:20s;animation-delay:-8s}
    @keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(40px,-30px) scale(1.08)}66%{transform:translate(-25px,20px) scale(.93)}}
    .particles{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
    .particle{position:absolute;border-radius:50%;animation:particleUp linear infinite;pointer-events:none}
    @keyframes particleUp{0%{transform:translateY(100vh);opacity:0}10%{opacity:.8}90%{opacity:.3}100%{transform:translateY(-40px);opacity:0}}

    /* ÉCRANS */
    .screen{display:none;position:relative;z-index:5;min-height:100vh;padding:1.5rem 1.25rem 6rem;max-width:560px;margin:0 auto}
    .screen.active{display:flex;flex-direction:column}
    .back-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s}
    .back-btn:hover{background:rgba(255,255,255,.18)}
    footer{text-align:center;padding:2rem 1rem 1rem;color:rgba(200,200,255,.3);font-size:.75rem;margin-top:auto}

    /* BOUTON HOME FIXE */
    .home-btn{position:fixed;bottom:1.25rem;right:1.25rem;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#7c6aff,#a78bfa);border:none;color:#fff;font-size:1.2rem;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(124,106,255,.5);z-index:300;transition:transform .2s}
    .home-btn:hover{transform:scale(1.1)}
    .home-btn.visible{display:flex}

    /* AUTH */
    #auth-screen{align-items:center;justify-content:center;text-align:center;gap:1.25rem;padding-top:2.5rem;z-index:10}
    .auth-box{background:rgba(13,10,30,.85);backdrop-filter:blur(20px);border:1px solid rgba(124,106,255,.3);border-radius:20px;padding:2rem 1.5rem;width:100%;max-width:360px;position:relative;z-index:10}
    .auth-title{font-family:'Outfit',sans-serif;font-size:1.4rem;font-weight:700;color:#fff;margin-bottom:.4rem}
    .auth-sub{font-size:.85rem;color:var(--muted);margin-bottom:1.5rem;line-height:1.6}
    .auth-tabs{display:flex;gap:.5rem;margin-bottom:1.5rem}
    .auth-tab{flex:1;padding:.65rem;border-radius:100px;border:1px solid rgba(255,255,255,.15);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.88rem;cursor:pointer;transition:all .2s}
    .auth-tab.active{background:rgba(124,106,255,.25);border-color:#a78bfa;color:#fff;font-weight:600}
    .auth-error{background:rgba(255,80,80,.1);border:1px solid rgba(255,100,100,.3);color:#fca5a5;border-radius:10px;padding:.65rem .875rem;font-size:.82rem;margin-bottom:.75rem;display:none}
    .auth-input{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:12px;color:#fff;font-family:'DM Sans',sans-serif;font-size:.95rem;padding:.8rem 1rem;margin-bottom:.75rem;transition:border-color .2s}
    .auth-input:focus{outline:none;border-color:var(--accent)}
    .auth-input::placeholder{color:rgba(255,255,255,.3)}
    .auth-btn{width:100%;background:linear-gradient(135deg,#7c6aff,#a78bfa);border:none;color:#fff;font-family:'Outfit',sans-serif;font-size:1rem;font-weight:700;padding:.875rem;border-radius:100px;cursor:pointer;margin-bottom:.75rem;transition:transform .2s}
    .auth-btn:hover{transform:translateY(-2px)}
    .auth-divider{display:flex;align-items:center;gap:.75rem;margin:.5rem 0;color:var(--muted);font-size:.8rem}
    .auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.1)}
    .oauth-btn{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);color:#fff;font-family:'DM Sans',sans-serif;font-size:.92rem;font-weight:500;padding:.8rem 1rem;border-radius:12px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.75rem;margin-bottom:.625rem}
    .oauth-btn:hover{background:rgba(255,255,255,.13);transform:translateY(-1px)}
    .oauth-btn.google{border-color:rgba(234,67,53,.4)}.oauth-btn.google:hover{background:rgba(234,67,53,.1)}
    .oauth-btn.discord{border-color:rgba(88,101,242,.5)}.oauth-btn.discord:hover{background:rgba(88,101,242,.15)}
    .oauth-icon{width:20px;height:20px;flex-shrink:0}
    .auth-guest{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.88rem;padding:.8rem;border-radius:100px;cursor:pointer;transition:all .2s}
    .auth-guest:hover{color:#fff;border-color:rgba(255,255,255,.25)}

    /* USER BADGE */
    .hero-topbar{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:360px;position:relative}
    .user-badge{display:none;align-items:center;gap:.5rem;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);border-radius:100px;padding:.35rem .875rem .35rem .4rem;cursor:pointer;transition:all .2s}
    .user-badge:hover{border-color:var(--accent2)}
    .user-badge.visible{display:flex}
    .user-avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#7c6aff,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:#fff;flex-shrink:0}
    .user-name{font-size:.78rem;color:#fff;font-weight:500;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .user-menu{position:absolute;top:calc(100% + 8px);right:0;background:#12132a;border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:.5rem;min-width:170px;z-index:400;display:none;box-shadow:0 8px 32px rgba(0,0,0,.5)}
    .user-menu.open{display:block}
    .user-menu-item{display:flex;align-items:center;gap:.625rem;padding:.65rem .875rem;border-radius:10px;font-size:.82rem;color:#e0e0ff;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:'DM Sans',sans-serif;transition:background .15s}
    .user-menu-item:hover{background:rgba(255,255,255,.08);color:#fff}
    .user-menu-item.danger{color:#fca5a5}
    .user-menu-item.danger:hover{background:rgba(255,80,80,.1)}

    /* HERO */
    #hero{align-items:center;justify-content:center;text-align:center;gap:1.25rem;padding-top:1.5rem}
    .logo{font-family:'Outfit',sans-serif;font-size:.85rem;font-weight:600;letter-spacing:.25em;color:var(--accent2);text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:.5rem}
    .hero-title{font-family:'Outfit',sans-serif;font-size:clamp(1.8rem,5.5vw,2.6rem);font-weight:700;line-height:1.35;color:#fff;max-width:400px;letter-spacing:-.02em}
    .hero-title span{color:var(--accent2)}
    .hero-sub{color:var(--muted);font-size:.95rem;max-width:300px;line-height:1.65}
    .hero-features{display:grid;grid-template-columns:1fr 1fr;gap:.625rem;width:100%;max-width:360px}
    .hero-feature{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:.875rem;text-align:center;display:flex;flex-direction:column;align-items:center;gap:.4rem}
    .hero-feature i{font-size:1.6rem;color:var(--accent2)}
    .hero-feature-title{font-family:'Outfit',sans-serif;font-size:.8rem;font-weight:600;color:#fff}
    .hero-feature-desc{font-size:.7rem;color:var(--muted);line-height:1.45}
    .hero-actions{display:flex;flex-direction:column;align-items:center;gap:.75rem;width:100%;max-width:340px}
    .btn-primary{background:linear-gradient(135deg,#7c6aff,#a78bfa);border:none;color:#fff;font-family:'Outfit',sans-serif;font-size:1rem;font-weight:700;padding:.9rem 2rem;border-radius:100px;cursor:pointer;box-shadow:0 0 36px rgba(124,106,255,.45);transition:transform .2s;width:100%}
    .btn-primary:hover{transform:translateY(-2px)}
    .btn-secondary{background:transparent;border:1px solid rgba(255,255,255,.2);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.9rem;padding:.75rem;border-radius:100px;cursor:pointer;transition:all .2s;width:100%}
    .btn-secondary:hover{border-color:var(--accent2);color:#fff}
    .btn-weekly{background:transparent;border:1px solid rgba(74,222,128,.35);color:#4ade80;font-family:'DM Sans',sans-serif;font-size:.9rem;padding:.75rem;border-radius:100px;cursor:pointer;transition:all .2s;width:100%}
    .btn-weekly:hover{background:rgba(74,222,128,.1)}
    .btn-history{background:transparent;border:1px solid rgba(255,255,255,.15);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.9rem;padding:.75rem;border-radius:100px;cursor:pointer;transition:all .2s;width:100%;display:none}
    .btn-history:hover{border-color:var(--accent2);color:#fff}
    .count-badge{background:rgba(124,106,255,.35);color:var(--accent2);font-size:.7rem;font-weight:600;padding:.1rem .5rem;border-radius:100px;margin-left:.4rem}
    .btn-alt{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.17);color:#e0e0ff;font-family:'DM Sans',sans-serif;font-size:.9rem;padding:.75rem 1rem;border-radius:100px;cursor:pointer;transition:all .2s}
    .btn-alt:hover{border-color:var(--accent2);color:#fff}
    .btn-danger{background:rgba(255,80,80,.08);border:1px solid rgba(255,100,100,.25);color:#fca5a5;font-family:'DM Sans',sans-serif;font-size:.85rem;padding:.65rem 1rem;border-radius:100px;cursor:pointer}

    /* MESSAGES */
    .error-msg{background:rgba(255,80,80,.1);border:1px solid rgba(255,100,100,.3);color:#fca5a5;border-radius:12px;padding:.875rem 1rem;font-size:.85rem;margin-bottom:1rem;display:none;line-height:1.5}
    .success-msg{background:rgba(30,215,96,.08);border:1px solid rgba(30,215,96,.25);color:#4ade80;border-radius:12px;padding:.75rem 1rem;font-size:.85rem;margin-bottom:.75rem;display:none}
    .feedback-banner{background:rgba(124,106,255,.07);border:1px solid rgba(124,106,255,.2);border-radius:14px;padding:.75rem 1rem;margin-bottom:.875rem;font-size:.8rem;color:var(--accent2);display:none}

    /* STEPPER */
    #form-screen{gap:0}
    .stepper-header{display:flex;align-items:center;gap:.75rem;margin-bottom:1.75rem}
    .stepper-progress-wrap{flex:1}
    .stepper-label{font-size:.72rem;color:var(--muted);margin-bottom:.35rem;display:flex;justify-content:space-between}
    .stepper-bar{height:3px;background:rgba(255,255,255,.1);border-radius:100px;overflow:hidden}
    .stepper-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:100px;transition:width .4s ease}
    .step-panel{display:none}.step-panel.active{display:block}
    .step-question{font-family:'Outfit',sans-serif;font-size:1.25rem;font-weight:700;color:#fff;margin-bottom:.75rem;line-height:1.5}
    .step-hint{font-size:.85rem;color:var(--muted);margin-bottom:1.25rem;line-height:1.65}
    .section-label{font-size:.68rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--accent2);margin-bottom:.6rem;margin-top:.5rem}
    .section-label span{color:var(--muted);font-size:.62rem;letter-spacing:0;text-transform:none;font-weight:400}

    /* PILLS */
    .pills{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-bottom:1.25rem}
    .era-pills{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-bottom:1.25rem}
    .pill{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);color:#d0d0f0;font-family:'DM Sans',sans-serif;font-size:.8rem;padding:.55rem .3rem;border-radius:14px;cursor:pointer;transition:all .2s;text-align:center;width:100%;min-height:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.25rem;line-height:1.25}
    .pill:hover{border-color:var(--accent2);color:#fff;background:rgba(255,255,255,.11)}
    .pill.selected{background:rgba(124,106,255,.28);border-color:#a78bfa;color:#fff;font-weight:500}
    .pill.all-genres.selected{background:rgba(255,215,0,.1);border-color:rgba(255,215,0,.4);color:#fde68a}
    .pill i{font-size:1.25rem;color:var(--accent2)}
    .pill.selected i{color:#fff}

    /* ENERGY */
    .energy-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:.625rem;margin-bottom:1.25rem}
    .energy-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:1rem .75rem;text-align:center;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.35rem}
    .energy-card:hover{border-color:var(--accent2);background:rgba(255,255,255,.1)}
    .energy-card.selected{background:rgba(124,106,255,.22);border-color:#a78bfa}
    .energy-card i{font-size:1.8rem;color:var(--accent2)}
    .energy-card.selected i{color:#fff}
    .e-label{font-family:'Outfit',sans-serif;font-size:.85rem;font-weight:700;color:#fff}
    .e-desc{font-size:.72rem;color:var(--muted)}

    /* RECAP */
    .recap-box{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:1.1rem 1.25rem;margin-bottom:1.25rem}
    .recap-row{display:flex;align-items:center;justify-content:space-between;padding:.4rem 0;border-bottom:1px solid rgba(255,255,255,.06)}
    .recap-row:last-child{border-bottom:none}
    .recap-key{font-size:.78rem;color:var(--muted)}
    .recap-val{font-size:.82rem;color:#fff;font-weight:500;text-align:right;max-width:65%}

    /* SURPRISE */
    .surprise-row{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:.875rem 1.1rem;margin-bottom:1.25rem}
    .surprise-info h4{font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:700;color:#fff;margin-bottom:.15rem}
    .surprise-info p{font-size:.78rem;color:var(--muted)}
    .toggle{width:44px;height:24px;background:rgba(255,255,255,.15);border-radius:100px;position:relative;cursor:pointer;transition:background .3s;border:1px solid rgba(255,255,255,.2);flex-shrink:0}
    .toggle.on{background:linear-gradient(135deg,#7c6aff,#a78bfa);border-color:#a78bfa}
    .toggle::after{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:2px;left:2px;transition:transform .3s}
    .toggle.on::after{transform:translateX(20px)}

    /* STEP NAV */
    .step-nav{display:flex;gap:.625rem;margin-top:.75rem}
    .btn-next{flex:1;background:linear-gradient(135deg,#7c6aff,#a78bfa);border:none;color:#fff;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;padding:.85rem;border-radius:100px;cursor:pointer;transition:transform .2s,opacity .2s}
    .btn-next:hover{transform:translateY(-2px)}
    .btn-next:disabled{opacity:.35;cursor:not-allowed;transform:none}
    .btn-generate{width:100%;background:linear-gradient(135deg,#7c6aff,#a78bfa);border:none;color:#fff;font-family:'Outfit',sans-serif;font-size:1.1rem;font-weight:700;padding:1rem;border-radius:100px;cursor:pointer;box-shadow:0 0 36px rgba(124,106,255,.45);transition:transform .2s;margin-bottom:.75rem}
    .btn-generate:hover{transform:translateY(-3px)}

    /* MOOD TEXTAREA */
    .mood-textarea{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.13);border-radius:14px;color:#e0e0ff;font-family:'DM Sans',sans-serif;font-size:.9rem;padding:.75rem 1rem;resize:none;min-height:68px;transition:border-color .2s;line-height:1.5;margin-bottom:1.25rem}
    .mood-textarea:focus{outline:none;border-color:var(--accent)}
    .mood-textarea::placeholder{color:rgba(200,200,255,.3)}

    /* LOADING */
    #loading-screen{align-items:center;justify-content:center;gap:2rem;text-align:center}
    .wave-container{display:flex;align-items:center;gap:5px;height:60px}
    .wave-bar{width:5px;border-radius:100px;background:linear-gradient(to top,#7c6aff,#a5f3fc);animation:wave 1.2s ease-in-out infinite}
    .wave-bar:nth-child(1){height:20px;animation-delay:0s}.wave-bar:nth-child(2){height:35px;animation-delay:.1s}.wave-bar:nth-child(3){height:50px;animation-delay:.2s}.wave-bar:nth-child(4){height:35px;animation-delay:.3s}.wave-bar:nth-child(5){height:20px;animation-delay:.4s}.wave-bar:nth-child(6){height:40px;animation-delay:.15s}.wave-bar:nth-child(7){height:55px;animation-delay:.25s}.wave-bar:nth-child(8){height:40px;animation-delay:.35s}.wave-bar:nth-child(9){height:20px;animation-delay:.45s}
    @keyframes wave{0%,100%{transform:scaleY(.5);opacity:.5}50%{transform:scaleY(1.2);opacity:1}}
    .loading-text{font-family:'Outfit',sans-serif;font-size:1.1rem;color:var(--muted)}

    /* RÉSULTATS */
    #results-screen,#saved-screen,#weekly-screen,#history-screen{gap:0;padding-bottom:7rem}
    .screen-header{display:flex;align-items:center;gap:.75rem;margin-bottom:.5rem;padding-top:.25rem}
    .screen-title{font-family:'Outfit',sans-serif;font-size:1.15rem;font-weight:700;color:#fff}
    .results-meta{font-size:.78rem;color:var(--muted);margin-bottom:1rem}

    /* SONG CARDS */
    .song-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.11);border-radius:16px;padding:.875rem 1rem;margin-bottom:.65rem;transition:border-color .2s}
    .song-card:hover{border-color:rgba(167,139,250,.4)}
    .song-card-top{display:flex;align-items:flex-start;gap:.625rem}
    .song-info{flex:1;min-width:0}
    .song-num{font-size:.68rem;color:var(--muted);font-weight:600;margin-bottom:.1rem}
    .song-artist{font-size:.8rem;color:var(--accent2);font-weight:500;margin-bottom:.15rem}
    .song-title{font-family:'Outfit',sans-serif;font-size:.95rem;font-weight:700;color:#fff;margin-bottom:.3rem}
    .genre-tag{font-size:.68rem;padding:.2rem .65rem;border-radius:100px;background:rgba(165,243,252,.1);color:var(--cyan);border:1px solid rgba(165,243,252,.2);display:inline-block}
    .trend-tag{font-size:.68rem;padding:.2rem .6rem;border-radius:100px;background:rgba(74,222,128,.1);color:#4ade80;border:1px solid rgba(74,222,128,.2);margin-left:.35rem;display:inline-block}
